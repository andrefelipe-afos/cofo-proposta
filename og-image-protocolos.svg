  </text>
  <text x="120" y="295" font-family="Inter, -apple-system, sans-serif" font-size="58" font-weight="900" fill="url(#titleGrad)">
    T&#xE9;cnicos
  </text>

  <text x="120" y="345" font-family="Inter, -apple-system, sans-serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.5)">
