  <text x="570" y="403" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#4ade80" text-anchor="middle">Brave</text>

  <rect x="610" y="385" width="90" height="28" rx="6" fill="rgba(220,38,38,0.1)" stroke="rgba(220,38,38,0.2)" stroke-width="1"/>
  <text x="655" y="403" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#f87171" text-anchor="middle">Safe Wallet</text>

  <rect x="710" y="385" width="90" height="28" rx="6" fill="rgba(220,38,38,0.1)" stroke="rgba(220,38,38,0.2)" stroke-width="1"/>
