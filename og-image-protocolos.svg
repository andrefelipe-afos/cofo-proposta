  <circle cx="492" cy="490" r="5" fill="#7c3aed"/>
  <circle cx="492" cy="490" r="9" fill="none" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
  <text x="508" y="495" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.55)">DeFi + CeFi</text>

  <circle cx="652" cy="490" r="5" fill="#DC2626"/>
  <circle cx="652" cy="490" r="9" fill="none" stroke="rgba(220,38,38,0.3)" stroke-width="1"/>
  <text x="668" y="495" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.55)">MultiSig + Cold Storage</text>

  <circle cx="872" cy="490" r="5" fill="#0891b2"/>
  <circle cx="872" cy="490" r="9" fill="none" stroke="rgba(8,145,178,0.3)" stroke-width="1"/>
  <text x="888" y="495" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.55)">Multi jurisdi&#xE7;&#xF5;es</text>

