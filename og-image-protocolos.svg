  <!-- Bottom stats -->
  <circle cx="132" cy="490" r="5" fill="#0F52BA"/>
  <circle cx="132" cy="490" r="9" fill="none" stroke="rgba(15,82,186,0.3)" stroke-width="1"/>
  <text x="148" y="495" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.55)">11 m&#xF3;dulos</text>

  <circle cx="302" cy="490" r="5" fill="#16a34a"/>
  <circle cx="302" cy="490" r="9" fill="none" stroke="rgba(22,163,74,0.3)" stroke-width="1"/>
