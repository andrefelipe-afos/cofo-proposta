  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <path d="M 70 20 L 20 20 L 20 70" fill="none" stroke="rgba(15,82,186,0.35)" stroke-width="2" stroke-linecap="round"/>
  <path d="M 1130 610 L 1180 610 L 1180 560" fill="none" stroke="rgba(220,38,38,0.25)" stroke-width="2" stroke-linecap="round"/>

