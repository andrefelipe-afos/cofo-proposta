      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F52BA;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0F52BA;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1976D2;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#0F52BA"/>
