<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070e1a"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F52BA;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0F52BA;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1976D2;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#0F52BA"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="240" cy="315" rx="400" ry="300" fill="url(#glow1)"/>
  <ellipse cx="960" cy="190" rx="350" ry="250" fill="url(#glow2)"/>
  <ellipse cx="840" cy="500" rx="300" ry="200" fill="url(#redGlow)"/>

  <!-- Grid subtle -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Corner accents -->
  <path d="M 70 20 L 20 20 L 20 70" fill="none" stroke="rgba(15,82,186,0.35)" stroke-width="2" stroke-linecap="round"/>
  <path d="M 1130 610 L 1180 610 L 1180 560" fill="none" stroke="rgba(220,38,38,0.25)" stroke-width="2" stroke-linecap="round"/>

  <!-- Card background -->
  <rect x="50" y="50" width="1100" height="530" rx="32" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Badge -->
  <rect x="120" y="130" width="310" height="36" rx="18" fill="rgba(15,82,186,0.2)" stroke="rgba(15,82,186,0.4)" stroke-width="1"/>
  <text x="275" y="153" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#5b9bf5" text-anchor="middle" letter-spacing="2">
    PROPOSTA &#x2022; FAMILY OFFICE DIGITAL
  </text>

  <!-- Title line 1 -->
  <text x="120" y="230" font-family="Inter, -apple-system, sans-serif" font-size="64" font-weight="900" fill="#ffffff">
    COFO &#x2014;
  </text>

  <!-- Title line 2 - gradient text -->
  <text x="120" y="300" font-family="Inter, -apple-system, sans-serif" font-size="64" font-weight="900" fill="url(#titleGrad)">
    Crypto Offshore
  </text>

  <!-- Title line 3 -->
  <text x="120" y="370" font-family="Inter, -apple-system, sans-serif" font-size="64" font-weight="900" fill="url(#titleGrad)">
    Family Office
  </text>

  <!-- Subtitle -->
  <text x="120" y="420" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.5)">
    Uma forma moderna de proteger e controlar seu patrim&#xF4;nio
  </text>

  <!-- Stats row -->
  <!-- Dot 1 - Blue -->
  <circle cx="132" cy="490" r="5" fill="#0F52BA"/>
  <circle cx="132" cy="490" r="9" fill="none" stroke="rgba(15,82,186,0.3)" stroke-width="1"/>
  <text x="148" y="495" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.6)">
    Controle direto
  </text>

  <!-- Dot 2 - Green -->
  <circle cx="332" cy="490" r="5" fill="#16a34a"/>
  <circle cx="332" cy="490" r="9" fill="none" stroke="rgba(22,163,74,0.3)" stroke-width="1"/>
  <text x="348" y="495" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.6)">
    Acesso global 24/7
  </text>

  <!-- Dot 3 - Red -->
  <circle cx="552" cy="490" r="5" fill="#DC2626"/>
  <circle cx="552" cy="490" r="9" fill="none" stroke="rgba(220,38,38,0.3)" stroke-width="1"/>
  <text x="568" y="495" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.6)">
    Zero intermedi&#xE1;rios
  </text>

  <!-- Dot 4 - Cyan -->
  <circle cx="772" cy="490" r="5" fill="#0891b2"/>
  <circle cx="772" cy="490" r="9" fill="none" stroke="rgba(8,145,178,0.3)" stroke-width="1"/>
  <text x="788" y="495" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.6)">
    Multi jurisdi&#xE7;&#xF5;es
  </text>

</svg>
