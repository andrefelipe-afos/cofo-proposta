<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>OG Image — COFO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1200px;
            height: 630px;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a1628;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Background pattern */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(15,82,186,0.25) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 30%, rgba(25,118,210,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(220,38,38,0.08) 0%, transparent 40%);
        }

        /* Subtle grid */
        body::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .card {
            position: relative;
            z-index: 2;
            width: 1100px;
            height: 530px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 32px;
            padding: 60px 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            backdrop-filter: blur(20px);
        }

        .badge {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(15,82,186,0.2);
            border: 1px solid rgba(15,82,186,0.4);
            border-radius: 50px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #5b9bf5;
            margin-bottom: 28px;
            width: fit-content;
        }

        h1 {
            font-size: 72px;
            font-weight: 900;
            line-height: 1.05;
            margin-bottom: 10px;
            color: #ffffff;
        }

        h1 span {
            background: linear-gradient(135deg, #3b82f6 0%, #1565C0 40%, #0F52BA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 24px;
            color: rgba(255,255,255,0.55);
            font-weight: 400;
            margin-bottom: 40px;
            line-height: 1.4;
        }

        .stats {
            display: flex;
            gap: 32px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .stat-dot.blue { background: #0F52BA; box-shadow: 0 0 12px rgba(15,82,186,0.5); }
        .stat-dot.green { background: #16a34a; box-shadow: 0 0 12px rgba(22,163,74,0.5); }
        .stat-dot.red { background: #DC2626; box-shadow: 0 0 12px rgba(220,38,38,0.5); }
        .stat-dot.cyan { background: #0891b2; box-shadow: 0 0 12px rgba(8,145,178,0.5); }

        .stat-text {
            font-size: 15px;
            font-weight: 600;
            color: rgba(255,255,255,0.65);
            letter-spacing: 0.3px;
        }

        /* Corner accents */
        .corner-tl, .corner-br {
            position: absolute;
            width: 80px;
            height: 80px;
            z-index: 3;
        }

        .corner-tl {
            top: 20px; left: 20px;
            border-top: 2px solid rgba(15,82,186,0.3);
            border-left: 2px solid rgba(15,82,186,0.3);
            border-radius: 16px 0 0 0;
        }

        .corner-br {
            bottom: 20px; right: 20px;
            border-bottom: 2px solid rgba(220,38,38,0.2);
            border-right: 2px solid rgba(220,38,38,0.2);
            border-radius: 0 0 16px 0;
        }
    </style>
</head>
<body>
    <div class="corner-tl"></div>
    <div class="corner-br"></div>

    <div class="card">
        <div class="badge">Proposta &bull; Family Office Digital</div>
        <h1>COFO &mdash; <span>Crypto Offshore<br>Family Office</span></h1>
        <p class="subtitle">Uma forma moderna de proteger e controlar seu patrimônio</p>
        <div class="stats">
            <div class="stat">
                <div class="stat-dot blue"></div>
                <span class="stat-text">Controle direto</span>
            </div>
            <div class="stat">
                <div class="stat-dot green"></div>
                <span class="stat-text">Acesso global 24/7</span>
            </div>
            <div class="stat">
                <div class="stat-dot red"></div>
                <span class="stat-text">Zero intermediários</span>
            </div>
            <div class="stat">
                <div class="stat-dot cyan"></div>
                <span class="stat-text">Multi jurisdições</span>
            </div>
        </div>
    </div>
</body>
</html>
